services:
  - type: web
    name: authpilot-api
    env: rust
    buildCommand: cargo build --release
    startCommand: ./target/release/authpilot
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: FHIR_BASE_URL
        value: https://hapi.fhir.org/baseR4
      - key: RUST_LOG
        value: authpilot=info
      - key: PORT
        value: 8081
