name: Deploy Backend to Render

on:
  push:
    branches: [main]
    paths: ['backend/**']

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trigger Render Deploy
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
      - name: Verify health
        run: |
          sleep 30
          curl -f "${{ secrets.BACKEND_URL }}/health"
