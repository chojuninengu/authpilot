name: Deploy Backend to Render

on:
  push:
    branches: [main]
    paths: ['backend/**']

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trigger Render Deploy
        if: env.RENDER_DEPLOY_HOOK != ''
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          curl -X POST "${{ env.RENDER_DEPLOY_HOOK }}"
      - name: Skip Deploy (Secret Missing)
        if: env.RENDER_DEPLOY_HOOK == ''
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          echo "RENDER_DEPLOY_HOOK secret is not set. Skipping deployment."
          echo "Please add RENDER_DEPLOY_HOOK to your GitHub repository secrets."
      - name: Verify health
        if: env.RENDER_DEPLOY_HOOK != '' && env.BACKEND_URL != ''
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: |
          sleep 30
          curl -f "${{ env.BACKEND_URL }}/health"
